<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#621639"/>
      <stop offset="55%" stop-color="#E93D82"/>
      <stop offset="100%" stop-color="#F86CA7"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe6ef"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <g transform="translate(72 90)">
    <g fill="url(#bar)">
      <rect x="0"   y="64"  width="20" height="56"  rx="10"/>
      <rect x="32"  y="40"  width="20" height="104" rx="10"/>
      <rect x="64"  y="16"  width="20" height="152" rx="10"/>
      <rect x="96"  y="48"  width="20" height="88"  rx="10"/>
      <rect x="128" y="72"  width="20" height="40"  rx="10"/>
    </g>
  </g>

  <g fill="#ffffff" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif">
    <text x="260" y="170" font-size="56" font-weight="700" letter-spacing="-1.5">moodymusic</text>
    <text x="262" y="208" font-size="22" font-weight="400" opacity="0.92">tiny playlists for any mood</text>
  </g>

  <g transform="translate(520 240)" opacity="0.9">
    <circle cx="0"  cy="20" r="10" fill="#0a0a0a"/>
    <circle cx="26" cy="14" r="10" fill="#0a0a0a"/>
    <rect x="-2" y="-22" width="4" height="44" fill="#0a0a0a"/>
    <rect x="24" y="-26" width="4" height="42" fill="#0a0a0a"/>
    <path d="M -2 -22 Q 14 -34 28 -26 L 28 -14 Q 14 -22 -2 -10 Z" fill="#0a0a0a"/>
  </g>
</svg>
